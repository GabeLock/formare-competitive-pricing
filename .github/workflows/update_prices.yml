name: Update prices

on:
  schedule:
    # Alvo: a cada 30 minutos; o GitHub Actions pode iniciar com atraso.
    - cron: "7,37 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: update-prices
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Initialize database
        run: python run.py --init-db

      - name: Collect prices
        run: python run.py --collect
        env:
          FORMARE_BOT_CONTACT_EMAIL: ${{ vars.FORMARE_BOT_CONTACT_EMAIL || 'pricing@example.com' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FORMARE_ENVIRONMENT: production

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: collection-logs
          path: logs/
          if-no-files-found: ignore
