name: Update prices

on:
  schedule:
    - cron: "0 11,20 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-prices
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Initialize database
        run: python run.py --init-db

      - name: Collect prices
        run: python run.py --collect
        env:
          FORMARE_BOT_CONTACT_EMAIL: ${{ vars.FORMARE_BOT_CONTACT_EMAIL || 'pricing@example.com' }}

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: collection-logs
          path: logs/
          if-no-files-found: ignore

      - name: Commit database changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/database/prices.db
          git diff --cached --quiet || git commit -m "Update price database"
          git push
