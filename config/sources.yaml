  - name: "Mercado Livre"
    tier: benchmark_publico
    region: "Nacional (múltiplos vendedores)"
    price_type_expected: auto_scraped
    platform: mercadolivre_api
    urls:
      - category: rolinho_galvalume
        query: "rolinho galvalume 0,43"
