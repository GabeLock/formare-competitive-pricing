    urls:
      - category: perfil_montante
        url: "https://anandametais.com.br/produtos/drywall-3"
      - category: perfil_guia
        url: "https://anandametais.com.br/produtos/drywall-3"

  - name: "Multiperfil"
    tier: tecnico_referencia
    region: "Nacional"
    price_type_expected: unknown
    urls:
      - category: divisoria_drywall
