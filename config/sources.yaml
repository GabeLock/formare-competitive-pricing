  # ---------------------------------------------------------------
  # TIER 3 — Canais com preço público confirmado (benchmark de mercado)
  # ---------------------------------------------------------------
  - name: "Gravia"
    tier: benchmark_publico
    region: "Nacional (Brasília/DF)"
    price_type_expected: auto_scraped
    platform: vtex
    urls:
